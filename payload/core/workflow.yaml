# Workflow configuration — read by the .opencode/commands/* pipeline commands.
# Tool-agnostic: any agent (opencode, Claude Code, etc.) can read this file.

git:
  main_branch: main            # release branch — protected, never worked on directly
  integration_branch: develop  # PRs target this branch (git-flow)
  branch_prefix: feature/
  # Branch naming: if the change is linked to a backlog task with a real Jira
  # key, branches are <prefix><task-id>-<change-name>
  # (e.g. feature/PROJ-123-speed-up-search); otherwise <prefix><change-name>.
  # Commands parse both forms when inferring the change from the branch name.
  # Working mode for implementation:
  #   worktree → /opsx:apply creates a git worktree per change at .worktrees/
  #              on a fresh feature/<change> branch off integration_branch.
  #              Apply + verify run inside the worktree; /ship merges back.
  #              Default for new projects (matches the OpenSpec + git-worktree
  #              flow from https://intent-driven.dev/blog/2026/04/01/openspec-git-worktrees-opencode/).
  #   feature  → always require feature/<change> branches + PR (strict), but
  #              without the worktree isolation. Use when worktrees can't run.
  #   flexible → feature branches recommended, but committing directly on the
  #              integration branch is allowed; /ship then skips PR/merge.
  work_mode: worktree
  commit_convention: conventional  # https://www.conventionalcommits.org
  commit_scope_from: change    # scope = openspec change name unless overridden

  # Worktree settings (only used when work_mode == worktree).
  worktree:
    dir: .worktrees            # per-change worktrees live here, gitignored
    base_branch: develop       # branched off the integration branch (overrides integration_branch if both set)
    auto_remove: true          # /ship removes the worktree after merge; set to false to keep it

# Orchestration toggle — governs how /work handles multiple changes.
# Default: yes (parallel SubAgents, one per non-conflicting change).
# Set to `no` to apply changes sequentially on the main checkout (no SubAgents).
workflow:
  use_subagents: yes          # yes | no — read by /work; defaults to `yes` if missing

platform:
  provider: auto               # auto | github | gitlab | none
  # auto: detect from `git remote get-url origin`; use gh/glab CLI if available.
  # none: never call a CLI; write the PR description to backlog/exports/pr/.

jira:
  project_key: PROJ            # task IDs are <project_key>-<n>, matching Jira keys
  export_dir: backlog/exports/jira
  default_issue_type: Task

content:
  # Default language offered for client-facing artifacts (discovery docs,
  # stories, Jira exports, PR descriptions). Commands ALWAYS confirm the
  # language with the user before generating; this is only the preselected option.
  default_language: es   # es | en

backlog:
  discovery_dir: backlog/discovery
  tasks_dir: backlog/tasks
  # Task IDs ARE Jira keys: <jira.project_key>-<n>, provided by the user.
  # If the Jira issue doesn't exist yet, use <project_key>-D<nn> (draft) and
  # rename the file/frontmatter when the real key is known.

worktrees:
  # Shared with git.worktree.*; kept here for backwards compatibility with
  # older opsx projects that read this block.
  base_branch: develop
  dir: .worktrees
